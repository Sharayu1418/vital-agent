name: live-evals
# Paid layer: real Vertex AI routing evals (~$0.02/run at Flash prices).
# Runs nightly + on demand — NOT on every PR (cost + flakiness discipline).
# Gate: pytest fails if routing accuracy drops below the threshold baked
# into the parametrized assertions.
#
# Required repo secrets:
#   GCP_WORKLOAD_IDENTITY_PROVIDER  (workload identity federation — no JSON keys)
#   GCP_SERVICE_ACCOUNT             (e.g. ci-evals@<project>.iam.gserviceaccount.com)
#   GCP_PROJECT_ID                  (the GCP project the evals run against)
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"   # nightly 06:00 UTC

jobs:
  routing-evals:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write      # workload identity federation
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.11
      - run: uv sync --extra dev
      - run: uv run pytest tests/test_routing.py -v
        env:
          VITAL_LIVE_EVALS: "1"
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          OPENWEATHER_API_KEY: unused
          GOOGLE_PLACES_API_KEY: unused
